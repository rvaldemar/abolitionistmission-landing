# Nginx Configuration for Abolitionist Mission
# Location: /etc/nginx/sites-available/abolisionist_mission
# After changes: sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name abolitionistmisson.org www.abolitionistmisson.org;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/abolisionist_mission/current/public;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name abolitionistmisson.org www.abolitionistmisson.org;

    # SSL Certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/abolitionistmisson.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/abolitionistmisson.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Document root — static files served directly
    root /var/www/abolisionist_mission/current/public;
    index index.html;

    # Logging
    access_log /var/log/nginx/abolisionist_mission_access.log;
    error_log /var/log/nginx/abolisionist_mission_error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;
}
